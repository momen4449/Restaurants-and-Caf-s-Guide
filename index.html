<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Porto Sokhna Guide</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>


<body>


<div class="header">

<div class="header-main">
🏆 Porto Sokhna Guide
</div>


<div class="header-sub">
🍴 دليل مطاعم بورتو السخنة
</div>

</div>



<div class="map-card">

<div id="map"></div>

</div>



<div class="bottom-nav">


<a href="index.html" class="active">

📍 الخريطة

</a>


<a href="restaurants.html">

🍴 المطاعم

</a>


<a href="about.html">

ℹ️ عن الموقع

</a>


</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="data.js"></script>


<script>


const map = L.map('map').setView(

[29.443438,32.479588],

17

);



L.tileLayer(

'https://tile.openstreetmap.org/{z}/{x}/{y}.png',

{

maxZoom:22

}

).addTo(map);





const restaurantIcon = L.divIcon({

html:'🍴',

className:'restaurant-icon',

iconSize:[30,30]

});





Object.keys(restaurantsData).forEach(name=>{


const rest = restaurantsData[name];



if(!rest.location) return;



const coords = rest.location.split(",");



const lat = coords[0];

const lng = coords[1];





L.marker(

[lat,lng],

{

icon:restaurantIcon

}

)

.addTo(map)



.bindPopup(`


<div style="text-align:center;width:220px;">


<img

src="${rest.logo}"

style="

width:100px;

height:100px;

object-fit:cover;

border-radius:12px;

border:2px solid #d4af37;

"



>



<h3>

${name}

</h3>




<p style="color:#d4af37;font-weight:bold;">

${rest.rating}

</p>



<button

onclick="

localStorage.setItem('restaurant','${name}');

window.location.href='restaurant.html';

"



style="

width:100%;

padding:10px;

border:none;

border-radius:8px;

background:#e63946;

color:white;

font-weight:bold;

cursor:pointer;

"

>


عرض المطعم


</button>



</div>



`);



});



</script>


</body>

</html>
