<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Porto Sokhna Guide</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>

<body>

<div class="header">

<div class="header-main">
🏆 Porto Sokhna Guide
</div>

<div class="header-sub">
🍴 دليل مطاعم بورتو السخنة
</div>

</div>

<div class="map-card">
<div id="map"></div>
</div>

<div class="bottom-nav">

<a href="index.html" class="active">
📍 الخريطة
</a>

<a href="restaurants.html">
🍴 المطاعم
</a>

<a href="about.html">
ℹ️ عن الموقع
</a>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView(
[29.443438,32.479588],
17
);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:22
}
).addTo(map);

const restaurantIcon = L.divIcon({
html:'🍴',
className:'restaurant-icon',
iconSize:[30,30]
});

const restaurants = [

{
name:"Murano",
lat:29.444396848112312,
lng:32.4820499221124,
logo:"images/murano.jpg"
},

{
name:"Second Cup",
lat:29.444890806997023,
lng:32.48137861896577,
logo:"images/second-cup.jpg"
},

{
name:"KIG Market",
lat:29.444279017853116,
lng:32.4814546067667,
logo:"images/kig-market.png"
},

{
name:"ليالي فيروزا",
lat:29.444612789205223,
lng:32.48136785931161,
logo:"images/layaly-firoza.jpg"
},

{
name:"Labash لبش",
lat:29.444762560002808,
lng:32.48092262211434,
logo:"images/labash.jpg"
},

{
name:"تشيليز",
lat:29.444750,
lng:32.480466,
logo:"images/chilis.png"
},

{
name:"بطاطس اند زلابيا",
lat:29.445787729170053,
lng:32.48197943377611,
logo:"images/batates-zalabia.jpg"
}

];

restaurants.forEach(rest=>{

L.marker(
[rest.lat,rest.lng],
{
icon:restaurantIcon
}
)

.addTo(map)

.bindPopup(`

<div style="text-align:center;width:220px;">

<img
src="${rest.logo}"
alt="${rest.name}"
style="
width:100px;
height:100px;
object-fit:cover;
border-radius:12px;
margin-bottom:10px;
">

<h3>${rest.name}</h3>

<p style="
color:#d4af37;
font-weight:bold;
margin:8px 0;
">

⭐ 4.8

</p>

<button

onclick="
localStorage.setItem('restaurant','${rest.name}');
window.location.href='restaurant.html';
"

style="
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#e63946;
color:white;
cursor:pointer;
"

>

عرض المنيو

</button>

</div>

`);

});

</script>

</body>
</html>
